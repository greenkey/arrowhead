name: Release

on:
  push:
    branches: [master]

jobs:
  check-version-bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if manifest.json was modified
        id: check-manifest
        run: |
          echo "Checking manifest.json modification..."
          CHANGED_FILES=$(git log -1 --name-only --format="")
          echo "Changed files: $CHANGED_FILES"
          if echo "$CHANGED_FILES" | grep -q "manifest.json"; then
            echo "version_bump=true" >> $GITHUB_OUTPUT
            VERSION=$(jq -r '.version' manifest.json)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Detected version bump to $VERSION"
          else
            echo "version_bump=false" >> $GITHUB_OUTPUT
            echo "No version bump detected"
          fi

  create-release:
    runs-on: ubuntu-latest
    needs: check-version-bump
    if: needs.check-version-bump.outputs.version_bump == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Get changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            VERSION="${{ needs.check-version-bump.outputs.version }}"
            CHANGELOG_CONTENT=$(awk -v ver="[${VERSION}]" '/^## \['"$VERSION"'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md || echo "")
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=Release ${{ needs.check-version-bump.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        run: |
          VERSION=${{ needs.check-version-bump.outputs.version }}
          TAG_NAME="v$VERSION"
          echo "Creating tag: $TAG_NAME"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version-bump.outputs.version }}
          name: Release v${{ needs.check-version-bump.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}