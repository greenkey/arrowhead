name: Release

on:
  push:
    branches: [master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

  tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  create-release:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if this is a release commit
        id: is_release
        run: |
          COMMIT_MSG=$(git log -1 --format="%s")
          echo "Commit message: $COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -qiE "release|version"; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "This is a release commit"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Not a release commit, skipping"
          fi

      - name: Check if tag already exists
        id: tag_exists
        if: steps.is_release.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists locally"
            if git ls-remote --tags origin "v$VERSION" | grep -q "v$VERSION"; then
              echo "Tag v$VERSION already exists on remote, skipping release"
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "Tag exists locally but not remotely, will push"
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Tag v$VERSION does not exist, will create"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.is_release.outputs.is_release == 'true' && steps.tag_exists.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.is_release.outputs.is_release == 'true' && steps.tag_exists.outputs.skip == 'false'
        run: npm ci

      - name: Build plugin
        if: steps.is_release.outputs.is_release == 'true' && steps.tag_exists.outputs.skip == 'false'
        run: npm run build

      - name: Get changelog
        if: steps.is_release.outputs.is_release == 'true' && steps.tag_exists.outputs.skip == 'false'
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            VERSION="${{ steps.version.outputs.version }}"
            CHANGELOG_CONTENT=$(awk -v ver="[${VERSION}]" '/^## \['"$VERSION"'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md || echo "")
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=Release ${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag and push
        if: steps.is_release.outputs.is_release == 'true' && steps.tag_exists.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        if: steps.is_release.outputs.is_release == 'true' && steps.tag_exists.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
