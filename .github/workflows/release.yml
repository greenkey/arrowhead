name: Create Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get all history for changelog
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
        
    - name: Extract tag and version
      id: tag_info
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "tag_clean=${TAG_NAME:-$GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        
    - name: Version validation
      # Extract version from manifest.json
      run: |
        VERSION=$(jq -r '.version' manifest.json)
        TAG_VERSION=$GITHUB_REF_NAME
        echo "Manifest Version: $VERSION"
        echo "Tag Version: $TAG_VERSION"
        if [ "$VERSION" != "$TAG_VERSION" ]; then
          echo "Error: Tag version ($GITHUB_REF_NAME) doesn't match manifest version ($VERSION)"
          exit 1
        fi
        
    - name: Install dependencies
      run: npm ci
      
    - name: Lint and typecheck
      run: npm run lint && npm run typecheck
      
    - name: Run build
      run: npm run build
      
    - name: Display summary
      run: |
        echo "  Release version: ${GITHUB_REF_NAME}"
        echo "  cimmit: ${GITHUB_SHA}"
        echo "  Node version: $(node --version)"
        echo "  NPM version: $(npm --version)"
      
    - name: Create Plugin ZIP and Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Get version
        VERSION=$(git describe --tags --abbrev=0)
        PLUGIN_NAME=$(jq -r '.id' manifest.json)
        RELEASE_FILE="${{ github.event.repository.name }}-${VERSION}.zip"
        
        echo "Creating release for ${VERSION}"
        
        # Create Plugin Archive
        zip -r "$RELEASE_FILE" main.js manifest.json styles.css README.md
        
        # Create a draft release
        gh release create "$VERSION" \
          "$RELEASE_FILE" \
          --title "Release $VERSION" \
          --notes-file CHANGELOG.md \
          -n "Built from commit ${GITHUB_SHA:0:7}" \
          --draft=true
      shell: bash