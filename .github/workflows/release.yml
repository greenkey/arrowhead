name: Release

on:
  push:
    branches: [master]

jobs:
  check-version-bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if manifest.json was modified
        id: check-manifest
        run: |
          echo "Checking for version bump..."
          CURRENT_VERSION=$(jq -r '.version' manifest.json)
          echo "Current version: $CURRENT_VERSION"
          
          # Get the latest tag, or default to v0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # Compare version with tag (remove 'v' prefix from tag if present)
          TAG_VERSION=${LATEST_TAG#v}
          
          if [ "v$CURRENT_VERSION" != "$LATEST_TAG" ]; then
            echo "version_bump=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Detected version bump to $CURRENT_VERSION"
          else
            echo "version_bump=false" >> $GITHUB_OUTPUT
            echo "No version bump detected (current version matches latest tag)"
          fi

  create-release:
    runs-on: ubuntu-latest
    needs: check-version-bump
    if: needs.check-version-bump.outputs.version_bump == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Get changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            VERSION="${{ needs.check-version-bump.outputs.version }}"
            CHANGELOG_CONTENT=$(awk -v ver="[${VERSION}]" '/^## \['"$VERSION"'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md || echo "")
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=Release ${{ needs.check-version-bump.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        run: |
          VERSION=${{ needs.check-version-bump.outputs.version }}
          TAG_NAME="v$VERSION"
          echo "Creating tag: $TAG_NAME"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version-bump.outputs.version }}
          name: Release v${{ needs.check-version-bump.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}